# Configurazione Database
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=giorgia
spring.datasource.driver-class-name=org.postgresql.Driver

# Strategia di Hibernate: "update" aggiorna le tabelle in automatico se modifichi il codice Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Genera il file schema.sql all'avvio dell'applicazione
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=create
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=schema.sql